version: "3"

# Cross-platform env loading (no bash `source`). Later files override earlier keys.
# Copy infrastructure/elk/.env.example → infrastructure/elk/.env; optional local overrides:
# infrastructure/elk/.env.local (gitignored).
dotenv:
  - infrastructure/elk/.env
  - infrastructure/elk/.env.local
  - infrastructure/backend/.env
  - infrastructure/backend/.env.local

vars:
  # STACK_VERSION / NETWORK override elk .env when both define the same key (Taskfile vars win).
  STACK_VERSION: 9.3.1
  NETWORK: elk_default
  CERTS_PATH: infrastructure/elk/volumes/certs
  REPO_ROOT:
    sh: pwd
  DEV_LOGS_PATH: infrastructure/elk/devlogs
  DEV_LOGS_CONTAINER_PATH: /var/log/dev
  DEV_LOGS_FILE: /var/log/dev/synthetic.log
  # Defaults if missing from dotenv (see infrastructure/elk/.env.example)
  KIBANA_PORT:
    sh: echo "${KIBANA_PORT:-5601}"
  OCSF_HOT_RETENTION_DAYS:
    sh: echo "${OCSF_HOT_RETENTION_DAYS:-7}"
  SYNTH_LOG_COUNT: 5000
  SYNTH_LOG_SLEEP_SEC: 0.01

tasks:
  infra:mkdir:
    desc: Create the folders for the volumes made during setup and used by ES / LS
    summary: |
      usage: task infra:mkdir
    cmds:
      - mkdir -p infrastructure/elk/volumes/certs/*
      - mkdir -p infrastructure/elk/volumes/esdata/*
      - mkdir -p infrastructure/elk/volumes/lsdata/*

  infra:clean:
    desc: Clean the volumes made during setup and used by ES / LS
    summary: |
      usage: task infra:clean
    cmds:
      - rm -rf infrastructure/elk/volumes/certs/*
      - rm -rf infrastructure/elk/volumes/esdata/*
      - rm -rf infrastructure/elk/volumes/lsdata/*

  infra:certs:generate:
    desc: Generate Elasticsearch/TLS certs (one-shot)
    summary: |
      Stops the ELK stack first so the `certs` volume is not in use, then runs the setup container.
      Generates the PKI under `infrastructure/elk/volumes/certs` using the same logic as the former `setup` container.
      Uses the `certs` compose profile (so it does not run on normal `infra:up`).
    dir: infrastructure/elk
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose-dns-override.yml down
      - docker compose --profile certs up --abort-on-container-exit setup

  infra:up:
    desc: Start ELK stack (stable certs; applies DNS override)
    summary: |
      usage: task infra:up -- <docker-compose-up-options>
      Examples:
      - task infra:up -- --force-recreate fleet
      - task infra:up -- --pull always
    dir: infrastructure/elk
    cmds:
      - docker network inspect forensiq_shared >/dev/null 2>&1 || docker network create forensiq_shared
      - |
        if [ ! -f volumes/certs/ca/ca.crt ]; then
          echo "ELK certs missing -> run: task infra:certs:generate";
          exit 1;
        fi
      - docker compose -f docker-compose.yml -f docker-compose-dns-override.yml up -d {{.CLI_ARGS}}

  infra:down:
    desc: Stop backend compose and remove shared Docker network (if present)
    summary: |
      usage: task infra:down
    dir: infrastructure/backend
    cmds:
      - docker compose down
      - docker network rm forensiq_shared 2>/dev/null || true

  # Enroll a Docker agent to ELK Fleet (infrastructure/elk).
  host-agent:enroll:
    desc: Enroll Elastic Agent (Docker) to ELK stack Fleet for log collection
    summary: |
      Prereqs: ELK stack running (cd infrastructure/elk && docker compose up -d).
      Get enrollment token from Kibana: Fleet → Add agent → Enroll in Fleet → copy token.
      Usage: task host-agent:enroll -- <ENROLLMENT_TOKEN>
    cmds:
      - mkdir -p {{.DEV_LOGS_PATH}}
      - |
        docker run -d \
          --name=elastic-agent-host \
          --user=root \
          --restart=always \
          --net={{.NETWORK}} \
          -v {{.REPO_ROOT}}/{{.CERTS_PATH}}:/usr/share/elastic-agent/config/certs:ro \
          -v {{.REPO_ROOT}}/{{.DEV_LOGS_PATH}}:{{.DEV_LOGS_CONTAINER_PATH}} \
          -v /var/log/journal:/var/log/journal:ro \
          -v /run/log/journal:/run/log/journal:ro \
          -v /etc/machine-id:/etc/machine-id:ro \
          -e FLEET_ENROLL=1 \
          -e FLEET_URL=https://fleet:8220 \
          -e FLEET_ENROLLMENT_TOKEN={{.CLI_ARGS}} \
          -e FLEET_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt \
          -e CERTIFICATE_AUTHORITIES=/usr/share/elastic-agent/config/certs/ca/ca.crt \
          -e ELASTICSEARCH_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt \
          docker.elastic.co/elastic-agent/elastic-agent:{{.STACK_VERSION}}
    preconditions:
      - sh: "test -d {{.CERTS_PATH}}/ca"
        msg: "ELK certs missing. Run `task infra:certs:generate` first."

  host-agent:synthetic:inject:
    desc: Inject high-volume synthetic logs into elastic-agent-host for dev load testing
    summary: |
      usage: task host-agent:synthetic:inject
      optional overrides:
        task host-agent:synthetic:inject SYNTH_LOG_COUNT=20000 SYNTH_LOG_SLEEP_SEC=0.001
      writes JSON lines to {{.DEV_LOGS_FILE}} (mounted from {{.DEV_LOGS_PATH}}).
    preconditions:
      - sh: "docker ps --format '{{`{{.Names}}`}}' | rg -x 'elastic-agent-host' >/dev/null"
        msg: "elastic-agent-host is not running. Start/enroll it first."
    cmds:
      - mkdir -p {{.DEV_LOGS_PATH}}
      - |
        docker exec elastic-agent-host sh -lc '
          i=1
          while [ "$i" -le "{{.SYNTH_LOG_COUNT}}" ]; do
            ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            printf "{\"@timestamp\":\"%s\",\"dataset\":\"dev.synthetic\",\"service.name\":\"synthetic-load\",\"host.name\":\"macos-dev\",\"event.kind\":\"event\",\"event.category\":\"process\",\"event.type\":\"info\",\"event.sequence\":%s,\"message\":\"synthetic event %s\"}\n" "$ts" "$i" "$i" >> "{{.DEV_LOGS_FILE}}"
            i=$((i + 1))
            sleep "{{.SYNTH_LOG_SLEEP_SEC}}"
          done
        '
      - docker exec elastic-agent-host sh -lc 'wc -l "{{.DEV_LOGS_FILE}}" && tail -n 3 "{{.DEV_LOGS_FILE}}"'

  backend:up:
    desc: Start the FastAPI backend + Postgres (production mode, no reload)
    summary: |
      usage: task backend:up
    dir: infrastructure/backend
    cmds:
      - docker compose up --build -d

  backend:down:
    desc: Stop the FastAPI backend + Postgres
    summary: |
      usage: task backend:down
    dir: infrastructure/backend
    cmds:
      - docker compose down

  backend:logs:
    desc: Tail logs from the FastAPI backend container
    summary: |
      usage: task backend:logs
    dir: infrastructure/backend
    cmds:
      - docker compose logs -f backend

  backend:restart:
    desc: Restart the backend container (prod)
    summary: |
      usage: task backend:restart
    dir: infrastructure/backend
    cmds:
      - docker compose restart backend

  backend:dev:
    desc: Start the FastAPI backend in dev mode (uvicorn --reload, watches app/)
    summary: |
      usage: task backend:dev
      Merges docker-compose.dev.yml override on top of docker-compose.yml.
      Any change to a file under app/ will trigger an automatic reload.
    dir: infrastructure/backend
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

  backend:dev:down:
    desc: Stop the dev backend stack
    summary: |
      usage: task backend:dev:down
    dir: infrastructure/backend
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.dev.yml down

  backend:db:upgrade:
    desc: Bootstrap DB schema via Alembic (idempotent — safe to run on any DB)
    summary: |
      usage: task backend:db:upgrade
      Runs `alembic upgrade head` inside the running backend container.
      On an empty DB this creates all tables; on an existing DB it's a no-op.
    dir: infrastructure/backend
    cmds:
      - docker compose exec backend uv run alembic upgrade head

  backend:db:current:
    desc: Show the current Alembic revision applied to the DB
    summary: |
      usage: task backend:db:current
    dir: infrastructure/backend
    cmds:
      - docker compose exec backend uv run alembic current

  host-agent:stop:
    desc: Stop and remove the host agent
    cmds:
      - docker stop elastic-agent-host && docker rm elastic-agent-host

  host-agent:logs:
    desc: Tail the agent logs
    cmds:
      - docker logs -f elastic-agent-host

  elk:fleet:bootstrap:
    desc: Create/update Fleet Elasticsearch + Logstash outputs (server-auth TLS)
    summary: |
      usage: task elk:fleet:bootstrap
      Requires ELK stack running, infrastructure/elk/.env, and jq on PATH.
      Sets Logstash TLS to verify server cert with CA only (no mTLS).
      Override Kibana URL: task elk:fleet:bootstrap KIBANA_URL=https://other:5601
    dir: infrastructure/elk
    preconditions:
      - sh: "test -f volumes/certs/ca/ca.crt"
        msg: "ELK certs missing. Run `task infra:certs:generate` first."
      - sh: "command -v jq >/dev/null"
        msg: "jq is required (e.g. pacman -S jq / apt install jq)."
    cmds:
      - bash scripts/fleet-bootstrap.sh

  elk:ilm:bootstrap:
    desc: Create/update OCSF ILM policy and index template
    summary: |
      usage: task elk:ilm:bootstrap
      Requires ELK stack running and infrastructure/elk/.env configured.
    dir: infrastructure/elk
    cmds:
      - |
        curl -sS --fail --cacert volumes/certs/ca/ca.crt \
          -u "elastic:{{.ELASTIC_PASSWORD}}" \
          -H 'Content-Type: application/json' \
          -X PUT "https://localhost:9200/_ilm/policy/ocsf-logs-7d" \
          -d "$(sed "s/\${OCSF_HOT_RETENTION_DAYS}/{{.OCSF_HOT_RETENTION_DAYS}}/g" elasticsearch/ilm/ocsf-logs-7d.json)"
      - |
        curl -sS --fail --cacert volumes/certs/ca/ca.crt \
          -u "elastic:{{.ELASTIC_PASSWORD}}" \
          -H 'Content-Type: application/json' \
          -X PUT "https://localhost:9200/_index_template/ocsf-logs-template" \
          -d @elasticsearch/templates/ocsf-logs-template.json
      - |
        curl -sS --fail --cacert volumes/certs/ca/ca.crt \
          -u "elastic:{{.ELASTIC_PASSWORD}}" \
          "https://localhost:9200/_ilm/policy/ocsf-logs-7d"

  elk:smoke:
    desc: Run hot/cold path smoke validation commands
    summary: |
      usage: task elk:smoke
      Publishes one log and checks ES hot path + backend cold ingest.
    dir: infrastructure/elk
    cmds:
      - logger -t forensiq-smoke '{"dataset":"system.auth","message":"forensiq smoke test","host.name":"smoke-host"}'
      - sleep 7
      - curl -s --cacert volumes/certs/ca/ca.crt -u "elastic:{{.ELASTIC_PASSWORD}}" "https://localhost:9200/ocsf-logs-*/_search?q=forensiq-smoke&sort=@timestamp:desc&size=5"
      - docker logs fastapi-backend --since 2m | rg "/api/cold/ingest|sealed|block_id|Invalid secret"

  minio:up:
    desc: Start local MinIO WORM services
    cmds:
      - docker compose -f infrastructure/backend/docker-compose.minio.yml up -d

  minio:down:
    desc: Stop local MinIO WORM services
    cmds:
      - docker compose -f infrastructure/backend/docker-compose.minio.yml down
