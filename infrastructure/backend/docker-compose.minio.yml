services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - forensiq_shared

  minio-init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done; mc mb local/forensiq-cold-dev --ignore-existing; mc version enable local/forensiq-cold-dev; mc retention set local/forensiq-cold-dev/ --default governance 7d; "
    networks:
      - forensiq_shared

volumes:
  minio_data:

networks:
  forensiq_shared:
    external: true
