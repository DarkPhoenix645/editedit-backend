services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - forensiq_shared

  minio-init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    depends_on:
      - minio
    environment:
      # Set to true once to delete and recreate the bucket with object lock (WORM).
      # Required if the bucket existed before --with-lock (PutObject retention would fail).
      MINIO_WORM_RECREATE_BUCKET: ${MINIO_WORM_RECREATE_BUCKET:-false}
    # Object lock can only be enabled at bucket creation: mc mb --with-lock.
    # Do not use --ignore-existing: it skips mb when a lock-less bucket exists (broken WORM).
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      if [ \"$${MINIO_WORM_RECREATE_BUCKET}\" = \"true\" ]; then
        mc rb --force local/forensiq-cold-dev 2>/dev/null || true;
      fi;
      if ! mc ls local/forensiq-cold-dev >/dev/null 2>&1; then
        mc mb local/forensiq-cold-dev --with-lock;
      fi;
      mc version enable local/forensiq-cold-dev 2>/dev/null || true;
      mc retention set local/forensiq-cold-dev/ --default governance 7d 2>/dev/null || true;
      "
    networks:
      - forensiq_shared

volumes:
  minio_data:

networks:
  forensiq_shared:
    external: true
