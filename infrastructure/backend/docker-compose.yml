services:
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/backend/Dockerfile
      network: host
    container_name: fastapi-backend
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../app:/app/app
      - ../../alembic.ini:/app/alembic.ini
      - ../../migrations:/app/migrations
      - ../elk/volumes/certs:/app/certs:ro
    command: sh -c "uv run uvicorn app.main:app --host ${HOST:-0.0.0.0} --port ${PORT:-8000} --ssl-certfile /app/certs/backend/backend.crt --ssl-keyfile /app/certs/backend/backend.key"
    restart: unless-stopped
    networks:
      default:
      elk_default:
        aliases:
          - backend
      forensiq_shared:

  db:
    image: postgres:15
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:

networks:
  elk_default:
    external: true
  forensiq_shared:
    external: true
