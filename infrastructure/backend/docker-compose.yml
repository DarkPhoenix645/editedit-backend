services:
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/backend/Dockerfile
      network: host
    container_name: fastapi-backend
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ../../app:/app/app
      - ../../alembic.ini:/app/alembic.ini
      - ../../migrations:/app/migrations
      - ../elk/volumes/certs:/app/certs:ro
    command: sh -c "uv run uvicorn app.main:app --host ${HOST:-0.0.0.0} --port ${PORT:-8000} --ssl-certfile /app/certs/backend/backend.crt --ssl-keyfile /app/certs/backend/backend.key"
    restart: unless-stopped
    networks:
      default:
      elk_default:
        aliases:
          - backend
      forensiq_shared:

  db:
    image: postgres:15
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - forensiq_shared

  minio-init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_WORM_RECREATE_BUCKET: ${MINIO_WORM_RECREATE_BUCKET:-false}
      WORM_BUCKET: ${WORM_BUCKET:-forensiq-cold-dev}
      MINIO_BUCKET: ${MINIO_BUCKET:-cold-blocks}
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      if [ \"$${MINIO_WORM_RECREATE_BUCKET}\" = \"true\" ]; then
        mc rb --force local/$${WORM_BUCKET} 2>/dev/null || true;
      fi;
      if ! mc ls local/$${WORM_BUCKET} >/dev/null 2>&1; then
        mc mb local/$${WORM_BUCKET} --with-lock;
      fi;
      mc version enable local/$${WORM_BUCKET} 2>/dev/null || true;
      mc retention set local/$${WORM_BUCKET}/ --default governance 7d 2>/dev/null || true;
      if ! mc ls local/$${MINIO_BUCKET} >/dev/null 2>&1; then
        mc mb local/$${MINIO_BUCKET} --with-lock;
      fi;
      mc version enable local/$${MINIO_BUCKET} 2>/dev/null || true;
      "
    networks:
      - forensiq_shared

volumes:
  postgres_data:
  minio_data:

networks:
  elk_default:
    external: true
  forensiq_shared:
    external: true
