input {
  pipeline {
    address => "hot"
  }
}

filter {
  # Parse JSON if agent sends JSON logs
  if [message] =~ "{" {
    json {
      source => "message"
    }
  }

  # Add OCSF base fields
  mutate {
    add_field => {
      "[ocsf][version]" => "1.0.0"
      "[ocsf][category]" => "security"
      "[ocsf][class]" => "authentication"
      "[ocsf][severity]" => "medium"
    }
  }

  # Example field mappings
  mutate {
    rename => {
      "[host][hostname]" => "[ocsf][host][hostname]"
      "[source][ip]"     => "[ocsf][src_endpoint][ip]"
      "[user][name]"     => "[ocsf][user][name]"
    }
  }

  # Normalize timestamp
  date {
    match => [ "@timestamp", "ISO8601" ]
    target => "[ocsf][time]"
  }
}

output {
  elasticsearch {
    hosts => ["https://es01:9200"]
    index => "ocsf-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl => true
    ssl_certificate_verification => false
  }

  # Optional debug
  stdout {
    codec => rubydebug
  }
}
