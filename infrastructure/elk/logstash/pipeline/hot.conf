input {
  pipeline {
    address => "hot"
  }
}

filter {
  # Parse JSON payloads from message and lift known fields.
  if [message] =~ "^\s*\{" {
    json {
      source => "message"
      target => "_parsed"
    }
    if "_jsonparsefailure" not in [tags] {
      mutate {
        replace => { "message" => "%{[_parsed][message]}" }
        add_field => {
          "[event][dataset]" => "%{[_parsed][dataset]}"
          "dataset" => "%{[_parsed][dataset]}"
          "[host][name]" => "%{[_parsed][host.name]}"
        }
      }
      mutate { remove_field => ["_parsed"] }
    }
  }

  # Keep evidence when upstream already sends a fingerprint.
  if [forensiq][event_fingerprint] {
    mutate {
      add_tag => ["forensiq_preexisting_fingerprint"]
      copy => {
        "[forensiq][event_fingerprint]" => "[forensiq][incoming_fingerprint]"
      }
      remove_field => ["[forensiq][event_fingerprint]"]
    }
  }

  # Create a unique event reference and derive immutable integrity hash.
  uuid { target => "[event][id]" }
  mutate { copy => { "[event][id]" => "[event_id]" } }

  ruby {
    init => 'require "digest"'
    code => '
      ts = event.get("@timestamp")
      ts = ts.nil? ? "" : ts.to_s
      msg = event.get("message")
      msg = msg.nil? ? "" : msg.to_s
      host = event.get("[host][name]")
      host = host.nil? ? "" : host.to_s
      dataset = event.get("[event][dataset]")
      dataset = dataset.nil? ? "" : dataset.to_s
      eid = event.get("[event][id]")
      eid = eid.nil? ? "" : eid.to_s
      payload = "@timestamp#{ts}message#{msg}[host][name]#{host}[event][dataset]#{dataset}[event][id]#{eid}"
      event.set("[forensiq][event_fingerprint]", Digest::SHA256.hexdigest(payload))
    '
  }

  mutate {
    copy => { "[forensiq][event_fingerprint]" => "[event][hash]" }
  }

  # Coarse on-ingest log type classification for ML bootstrap.
  mutate { add_field => { "[ml][log_type]" => "os" } }
  if [event][dataset] =~ /^application\./ {
    mutate { replace => { "[ml][log_type]" => "application" } }
  } else if [event][dataset] =~ /^cloud\./ {
    mutate { replace => { "[ml][log_type]" => "cloud" } }
  } else if [event][dataset] =~ /^iot\./ {
    mutate { replace => { "[ml][log_type]" => "iot" } }
  } else if [event][dataset] =~ /^kernel\./ or [event][dataset] =~ /^system\.kernel/ {
    mutate { replace => { "[ml][log_type]" => "kernel" } }
  } else if [event][dataset] =~ /^iam\./ or [event][dataset] =~ /^identity\./ or [event][category] =~ /authentication|iam/ {
    mutate { replace => { "[ml][log_type]" => "iam" } }
  } else if [event][dataset] =~ /^system\./ or [event][dataset] =~ /^os\./ {
    mutate { replace => { "[ml][log_type]" => "os" } }
  }

  # Trust tier values for ML are the 6 canonical classes:
  # application, cloud, iam, iot, kernel, os
  mutate { add_field => { "[forensiq][trust_tier]" => "%{[ml][log_type]}" } }

  # OCSF 1.0 normalization (generic base event by default).
  mutate {
    add_field => {
      "[ocsf][activity_id]" => "0"
      "[ocsf][activity_name]" => "Unknown"
      "[ocsf][category_uid]" => "0"
      "[ocsf][category_name]" => "Uncategorized"
      "[ocsf][class_uid]" => "0"
      "[ocsf][class_name]" => "Base Event"
      "[ocsf][severity_id]" => "3"
      "[ocsf][severity]" => "Medium"
      "[ocsf][type_uid]" => "0"
      "[ocsf][type_name]" => "Base Event: Unknown"
      "[ocsf][message]" => "%{[message]}"
      "[ocsf][time]" => "%{@timestamp}"
      "[ocsf][metadata][version]" => "1.0.0"
      "[ocsf][metadata][product][name]" => "ForensIQ"
      "[ocsf][metadata][uid]" => "%{[event][id]}"
    }
  }

  # Upgrade OCSF class only when input indicates IAM/auth semantics.
  if [event][dataset] =~ /^system\.auth/ or [event][dataset] =~ /^iam\./ or [event][category] =~ /authentication|iam/ {
    mutate {
      replace => {
        "[ocsf][category_uid]" => "3"
        "[ocsf][category_name]" => "Identity & Access Management"
        "[ocsf][class_uid]" => "3002"
        "[ocsf][class_name]" => "Authentication"
        "[ocsf][type_uid]" => "300200"
        "[ocsf][type_name]" => "Authentication: Unknown"
      }
    }
  }

  if [source][ip] {
    mutate { add_field => { "[ocsf][src_endpoint][ip]" => "%{[source][ip]}" } }
  }
  if [destination][ip] {
    mutate { add_field => { "[ocsf][dst_endpoint][ip]" => "%{[destination][ip]}" } }
  }
  if [user][name] {
    mutate { add_field => { "[ocsf][user][name]" => "%{[user][name]}" } }
  }

  if [event][outcome] == "success" {
    mutate {
      add_field => {
        "[ocsf][status]" => "Success"
        "[ocsf][status_id]" => "1"
      }
    }
  } else if [event][outcome] == "failure" {
    mutate {
      add_field => {
        "[ocsf][status]" => "Failure"
        "[ocsf][status_id]" => "2"
      }
    }
  } else {
    mutate {
      add_field => {
        "[ocsf][status]" => "Unknown"
        "[ocsf][status_id]" => "0"
      }
    }
  }

  mutate {
    convert => {
      "[ocsf][activity_id]" => "integer"
      "[ocsf][category_uid]" => "integer"
      "[ocsf][class_uid]" => "integer"
      "[ocsf][severity_id]" => "integer"
      "[ocsf][type_uid]" => "integer"
      "[ocsf][status_id]" => "integer"
    }
  }

  # ML helper fields with safe defaults.
  mutate {
    add_field => {
      "[ml][outcome]" => "unknown"
      "[ml][metadata][source_type]" => "unknown"
    }
  }

  if [source][ip] {
    mutate { add_field => { "[ml][source_ip]" => "%{[source][ip]}" } }
  }
  if [destination][ip] {
    mutate { add_field => { "[ml][dest_ip]" => "%{[destination][ip]}" } }
  }
  if [user][name] {
    mutate { add_field => { "[ml][user_id]" => "%{[user][name]}" } }
  }
  if [event][outcome] {
    mutate { replace => { "[ml][outcome]" => "%{[event][outcome]}" } }
  }
  if [file][path] {
    mutate { add_field => { "[ml][resource]" => "%{[file][path]}" } }
  } else if [url][original] {
    mutate { add_field => { "[ml][resource]" => "%{[url][original]}" } }
  }

  if [event][dataset] =~ /^system\.auth/ {
    mutate {
      add_field => { "[ml][action]" => "AUTH" }
      replace => { "[ml][metadata][source_type]" => "os" }
    }
  } else if [event][dataset] =~ /^system\.syslog/ {
    mutate {
      add_field => { "[ml][action]" => "SYSLOG" }
      replace => { "[ml][metadata][source_type]" => "os" }
    }
  } else if [event][dataset] =~ /^application\./ {
    mutate {
      add_field => { "[ml][action]" => "APP" }
      replace => { "[ml][metadata][source_type]" => "app" }
    }
  } else if [event][dataset] =~ /^cloud\./ {
    mutate {
      add_field => { "[ml][action]" => "CLOUD_EVENT" }
      replace => { "[ml][metadata][source_type]" => "cloud" }
    }
  } else if [event][dataset] =~ /^iot\./ {
    mutate {
      add_field => { "[ml][action]" => "IOT_EVENT" }
      replace => { "[ml][metadata][source_type]" => "iot" }
    }
  } else if [event][dataset] =~ /^kernel\./ or [event][dataset] =~ /^system\.kernel/ {
    mutate {
      add_field => { "[ml][action]" => "KERNEL_EVENT" }
      replace => { "[ml][metadata][source_type]" => "os" }
    }
  } else {
    mutate { add_field => { "[ml][action]" => "UNKNOWN" } }
  }
}

output {
  elasticsearch {
    hosts => ["https://es01:9200"]
    index => "ocsf-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
    ssl_verification_mode => "full"
  }
}
