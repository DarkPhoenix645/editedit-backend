input {
  pipeline {
    address => "hot"
  }
}

filter {
  # Parse JSON payloads from message if present.
  if [message] =~ "{" {
    json {
      source => "message"
      target => "event"
    }
  }

  # Add OCSF base fields
  mutate {
    add_field => {
      "[ocsf][version]" => "1.0.0"
      "[ocsf][category]" => "security"
      "[ocsf][class]" => "authentication"
      "[ocsf][severity]" => "medium"
    }
  }

  # Minimal event mapping into OCSF.
  mutate {
    rename => {
      "[host][name]"     => "[ocsf][host][hostname]"
      "[source][ip]"     => "[ocsf][src_endpoint][ip]"
      "[user][name]"     => "[ocsf][user][name]"
    }
  }

  # Add trust tier from dataset namespace.
  if [event][dataset] =~ /^system\./ {
    mutate { add_field => { "[forensiq][trust_tier]" => "T1" } }
  } else if [event][dataset] =~ /^application\./ {
    mutate { add_field => { "[forensiq][trust_tier]" => "T2" } }
  } else {
    mutate { add_field => { "[forensiq][trust_tier]" => "T3" } }
  }

  # Deterministic fingerprint shared with cold path trace records.
  fingerprint {
    method => "SHA256"
    source => ["@timestamp", "message", "[host][name]"]
    target => "[forensiq][event_fingerprint]"
  }

  # Normalize timestamp.
  date {
    match => [ "@timestamp", "ISO8601" ]
    target => "[ocsf][time]"
  }
}

output {
  elasticsearch {
    hosts => ["https://es01:9200"]
    index => "ocsf-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl => true
    cacert => "/usr/share/logstash/config/certs/ca/ca.crt"
    ssl_certificate_verification => true
  }
}
