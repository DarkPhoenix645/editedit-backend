input {
  elastic_agent {
    port => 5044
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
    ssl_certificate => "/usr/share/logstash/config/certs/logstash/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash/logstash.key"
    # Match Fleet UI template: agents present a client cert signed by the same CA (mTLS).
    ssl_client_authentication => "required"
  }
}

filter {
  # Mirror Fleet/integration traffic into ForensIQ hot/cold without touching the originals.
  # Original events stay unchanged for elasticsearch output; clones get type=forensiq_mirror only.
  # (clone filter: ecs disabled => clone marked via [type], not ECS tags — avoids tag merge surprises)
  if [data_stream] or [@metadata][_id] {
    clone {
      id => "forensiq_fleet_mirror"
      clones => ["forensiq_mirror"]
      ecs_compatibility => "disabled"
    }
  }
}

# Fleet / Elastic Agent integrations: originals MUST land in Elasticsearch with data_stream + API key
# (see https://www.elastic.co/docs/reference/fleet/logstash-output). Clones go to ForensIQ only.
output {
  if [type] == "forensiq_mirror" {
    pipeline {
      send_to => ["hot", "cold"]
    }
  } else if [@metadata][_id] {
    elasticsearch {
      hosts => ["https://es01:9200"]
      document_id => "%{[@metadata][_id]}"
      # Bootstrap-safe default for first deployment before Fleet API key exists.
      api_key => "${LOGSTASH_FLEET_API_KEY:__bootstrap__:__missing__}"
      data_stream => true
      manage_template => false
      ssl_enabled => true
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
      ssl_verification_mode => "full"
    }
  } else if [data_stream] {
    elasticsearch {
      hosts => ["https://es01:9200"]
      api_key => "${LOGSTASH_FLEET_API_KEY:__bootstrap__:__missing__}"
      data_stream => true
      manage_template => false
      ssl_enabled => true
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
      ssl_verification_mode => "full"
    }
  } else if [forensiq][path] == "hot" {
    pipeline {
      send_to => hot
    }
  } else if [forensiq][path] == "cold" {
    pipeline {
      send_to => cold
    }
  } else {
    pipeline {
      send_to => ["hot", "cold"]
    }
  }
}
