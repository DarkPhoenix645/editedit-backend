input {
  pipeline {
    address => "cold"
  }
}

filter {
  # Preserve raw event and only attach deterministic trace fingerprint.
  fingerprint {
    method => "SHA256"
    source => ["@timestamp", "message", "[host][name]"]
    target => "[forensiq][event_fingerprint]"
  }
}

output {
  http {
    url => "https://backend:8000/api/cold/ingest"
    http_method => "post"
    format => "json_batch"
    # http output v6+: flush_size / idle_flush_time removed; batching follows pipeline batch settings.
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
    ssl_verification_mode => "full"
    headers => {
      "Content-Type" => "application/json"
      "X-Logstash-Secret" => "${LOGSTASH_SHARED_SECRET}"
    }
    retry_failed => true
    automatic_retries => 3
  }
}
