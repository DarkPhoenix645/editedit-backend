input {
  pipeline {
    address => "cold"
  }
}

filter {
  # Preserve raw event and only attach deterministic trace fingerprint.
  fingerprint {
    method => "SHA256"
    source => ["@timestamp", "message", "[host][name]"]
    target => "[forensiq][event_fingerprint]"
  }
}

output {
  http {
    url => "https://backend:8000/api/cold/ingest"
    http_method => "post"
    format => "json_batch"
    flush_size => 500
    idle_flush_time => 5
    cacert => "/usr/share/logstash/config/certs/ca/ca.crt"
    headers => {
      "Content-Type" => "application/json"
      "X-Logstash-Secret" => "${LOGSTASH_SHARED_SECRET}"
    }
    retry_failed => true
    automatic_retries => 3
  }
}
