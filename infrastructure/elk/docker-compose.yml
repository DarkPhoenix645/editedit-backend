services:
  # Setup: generate certs only, then exit (no wait for ES)
  setup:
    profiles: ["certs"]
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    user: "0"
    working_dir: /usr/share/elasticsearch
    command: >
      bash -c '
        set -e;
        JAR="$${JAVA_HOME:-/usr/share/elasticsearch/jdk}/bin/jar";
        if [ ! -f config/certs/ca/ca.crt ]; then
          printf "\\n" | bin/elasticsearch-certutil ca --silent --pem --out /tmp/ca.zip;
          mkdir -p config/certs/ca;
          (cd config/certs && "$$JAR" xf /tmp/ca.zip);
          rm -f /tmp/ca.zip;
        fi;
        if [ ! -f config/certs/es01/es01.crt ]; then
          echo -e "instances:\\n  - name: es01\\n    dns: [es01, localhost]\\n  - name: kib01\\n    dns: [kib01, localhost]\\n  - name: fleet\\n    dns: [fleet, localhost]\\n  - name: logstash\\n    dns: [logstash, localhost]\\n  - name: backend\\n    dns: [backend, localhost]\\n" > config/certs/instances.yml;
          printf "\\n" | bin/elasticsearch-certutil cert --silent --pem --out /tmp/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          (cd config/certs && "$$JAR" xf /tmp/certs.zip);
          rm -f /tmp/certs.zip config/certs/instances.yml;
        fi;
        if [ ! -f config/certs/elastic_agent/elastic_agent.crt ]; then
          printf "\\n" | bin/elasticsearch-certutil cert --silent --pem --out /tmp/ea.zip --name elastic_agent --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          (cd config/certs && "$$JAR" xf /tmp/ea.zip);
          rm -f /tmp/ea.zip;
          if command -v openssl >/dev/null 2>&1; then
            openssl pkcs8 -inform PEM -in config/certs/elastic_agent/elastic_agent.key -topk8 -nocrypt -outform PEM -out config/certs/elastic_agent/elastic_agent.pkcs8.key;
          fi;
        fi;
        chown -R 1000:1000 config/certs;
        echo "Certs ready.";
      '
    healthcheck:
      test: ["CMD-SHELL", "test -f config/certs/es01/es01.crt"]
      interval: 2s
      retries: 30
      start_period: 30s

  # One-shot: set kibana_system password after ES is up
  kibana-password-init:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    volumes:
      - certs:/usr/share/elasticsearch/config/certs:ro
    user: "0"
    working_dir: /usr/share/elasticsearch
    depends_on:
      es01: { condition: service_healthy }
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    command: >
      bash -c '
        set -e;
        echo "Setting kibana_system password...";
        until curl -sf --cacert config/certs/ca/ca.crt -u "elastic:$${ELASTIC_PASSWORD}" -X POST -H "Content-Type: application/json" "https://es01:9200/_security/user/kibana_system/_password" -d "{\"password\":\"$${KIBANA_PASSWORD}\"}"; do
          echo "Waiting for ES..."; sleep 5;
        done;
        echo "Done.";
      '
    restart: "no"

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - esdata:/usr/share/elasticsearch/data
    ports:
      - ${ES_PORT}:9200
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - node.name=es01
      - cluster.initial_master_nodes=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/es01/es01.key
      - xpack.security.http.ssl.certificate=certs/es01/es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/es01/es01.key
      - xpack.security.transport.ssl.certificate=certs/es01/es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
    ulimits:
      memlock: { soft: -1, hard: -1 }
    healthcheck:
      test: ["CMD-SHELL", "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 10s
      retries: 20

  kib01:
    depends_on:
      kibana-password-init: { condition: service_completed_successfully }
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    volumes:
      - certs:/usr/share/kibana/config/certs
      - ./kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - ${KIBANA_PORT}:5601
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - ES_URL=https://es01:9200
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://es01:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_ACTIONS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    healthcheck:
      # Kibana often responds with 302 redirect from / to /login; treat 2xx/3xx as healthy.
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' --cacert config/certs/ca/ca.crt https://localhost:5601 | grep -Eq '^(2|3)[0-9][0-9]$'"]
      interval: 15s
      timeout: 10s
      retries: 20

  logstash:
    depends_on:
      es01: { condition: service_healthy }
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION}
    ports:
      - ${LOGSTASH_PORT:-5044}:5044
      - ${LOGSTASH_MONITORING_PORT:-9600}:9600
    volumes:
      - certs:/usr/share/logstash/config/certs:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - lsdata:/usr/share/logstash/data
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - LOGSTASH_SHARED_SECRET=${LOGSTASH_SHARED_SECRET}
      # From Fleet → Outputs → Logstash → Generate API key (minimal Logstash→ES privileges)
      - LOGSTASH_FLEET_API_KEY=${LOGSTASH_FLEET_API_KEY}

  fleet:
    depends_on:
      kib01: { condition: service_healthy }
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    user: root
    ports:
      - ${FLEET_PORT:-8220}:8220
    volumes:
      - certs:/usr/share/elastic-agent/config/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - FLEET_SERVER_ENABLE=1
      - FLEET_SERVER_HOST=0.0.0.0
      - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - FLEET_SERVER_ELASTICSEARCH_HOST=https://es01:9200
      - FLEET_SERVER_ELASTICSEARCH_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
      - ELASTICSEARCH_HOST=https://es01:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
      # Default bootstrap wait is 2m; first policy sync + ES output test can exceed that on cold start.
      - FLEET_SERVER_TIMEOUT=10m
      # Use the CA-signed cert the setup container generated for the "fleet" hostname.
      # Without these, Fleet Server auto-generates a self-signed cert that agents won't trust.
      - FLEET_SERVER_CERT=/usr/share/elastic-agent/config/certs/fleet/fleet.crt
      - FLEET_SERVER_CERT_KEY=/usr/share/elastic-agent/config/certs/fleet/fleet.key
      - FLEET_URL=https://fleet:8220
      # CA cert so the agent inside this container trusts fleet's own TLS cert during self-enrollment
      - FLEET_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
      - CERTIFICATE_AUTHORITIES=/usr/share/elastic-agent/config/certs/ca/ca.crt
      - KIBANA_FLEET_HOST=https://kib01:5601
      - KIBANA_FLEET_SETUP=1

# Volumes mounted and bound to an absolute host path.
# `ELK_VOLUMES_BASE` is injected by Taskfile (see Taskfile.yml).
volumes:
  certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ELK_VOLUMES_BASE:-./volumes}/certs
  esdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ELK_VOLUMES_BASE:-./volumes}/esdata
  lsdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ELK_VOLUMES_BASE:-./volumes}/lsdata
