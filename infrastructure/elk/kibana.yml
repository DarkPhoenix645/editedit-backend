server.name: kibana
server.host: "0.0.0.0"

# --- HTTP(S) / TLS ---
# Kibana serves HTTPS using the same PKI as Elasticsearch.
# External access should use https://localhost:5601 with the CA below.
server.ssl.enabled: true
server.ssl.certificate: /usr/share/kibana/config/certs/kib01/kib01.crt
server.ssl.key: /usr/share/kibana/config/certs/kib01/kib01.key

# --- Elasticsearch Connection ---
# hosts/password overridable via env: ELASTICSEARCH_HOSTS, ELASTICSEARCH_PASSWORD
elasticsearch.hosts: ["https://es01:9200"]
elasticsearch.username: kibana_system
elasticsearch.ssl.certificateAuthorities:
  - /usr/share/kibana/config/certs/ca/ca.crt

# --- Fleet Setup ---
# Default Fleet Server host (required for fleet-server-policy). Service name "fleet" = this compose.
xpack.fleet.fleetServerHosts:
  - id: default
    name: Fleet Server
    is_default: true
    host_urls:
      - https://fleet:8220

xpack.fleet.packages:
  - name: fleet_server
    version: latest
  - name: system
    version: latest

xpack.fleet.agentPolicies:
  - name: Fleet Server policy
    id: fleet-server-policy
    namespace: default
    is_default_fleet_server: true
    # Note: Even with Logstash default, Fleet Server policy
    # should ideally point to ES for its own health telemetry.
    package_policies:
      - name: fleet_server-1
        package:
          name: fleet_server

# --- Security & Reporting ---
# Encryption keys: set via env (XPACK_*_ENCRYPTIONKEY / XPACK_ACTIONS_ENCRYPTION_KEY).
xpack.reporting.roles.enabled: false
